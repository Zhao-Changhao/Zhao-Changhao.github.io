<!DOCTYPE html>
<html>
<head>
    <title>我的个人网站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .header {
            background-color: #007BFF;
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        .content {
            margin: 15px;
            color: #333;
        }

        .skill-list {
            list-style-type: none;
            padding: 0;
        }

        .skill-list li {
            margin: 5px 0;
        }

        .projects {
            margin: 10px 0;
        }

        .projects h3 {
            margin: 0;
        }

        .projects p {
            margin: 0 0 10px 0;
        }

        .contact-info a {
            color: #007BFF;
        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>欢迎来到我的个人网站</h1>
    </div>
    <div class="content">
        <h2>关于我</h2>
        <p>我是一个热衷于技术的开发者，专注于Web开发和人工智能。</p>
        <img src="buyudaren.jpg" alt="关于我">

        <h2>我的技能</h2>
        <ul class="skill-list">
            <li>Web开发</li>
            <li>机器学习</li>
            <li>数据分析</li>
        </ul>

        <h2>我的项目</h2>
        <div class="projects">
            <h3>项目A</h3>
            <p>这是我做的第一个项目，你可以在<a href="http://example.com">这里</a>查看。</p>
        </div>
        <div class="projects">
            <h3>项目B</h3>
            <p>这是我做的第二个项目，你可以在<a href="http://example.com">这里</a>查看。</p>
        </div>

        <h2>联系我</h2>
        <p class="contact-info">你可以通过以下方式与我联系：</p>
        <p class="contact-info">邮箱：<a href="mailto:example@example.com">example@example.com</a></p>
        <p class="contact-info">GitHub：<a href="https://github.com/username">我的GitHub</a></p>
    </div>
</body>
</html>
